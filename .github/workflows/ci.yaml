name: CI

concurrency:
  group: ci-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

on:
  push:
    branches:
      - master
      - release/*
    tags:
      - "v*"
    paths-ignore:
      - 'docs/**'
      - 'README.md'
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - labeled
      - unlabeled
  schedule:
    - cron: "0 10 * * *" # ~2am PST
  workflow_dispatch:
    inputs:
      run_release_test:
        type: boolean
        description: "Run release tests in vlab/hlab"
        required: false
        default: false
      debug_enabled:
        type: boolean
        description: "Run the build with tmate debugging enabled (https://github.com/marketplace/actions/debugging-with-tmate)"
        required: false
        default: false

jobs:
  test:
    runs-on: lab

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: true

      - name: Setup Just
        uses: extractions/setup-just@v3

      - name: Lint and generate code
        run: |
          just --timestamp lint-gha gen _lint

      - name: More Go lint
        uses: golangci/golangci-lint-action@v6
        with:
          # keep in sync with hack/tools.just
          version: v1.64.8

      - name: Run tests
        run: |
          just --timestamp test

      - name: Go mod tidy
        run: |
          go mod tidy
          go mod vendor

      # Don't remove it! We shouldn't allow CI to pass if there are any changes not committed after running gen/lint/test
      - name: Fail on dirty
        run: |
          if ! git status --short || ! git diff --quiet; then
            git --no-pager diff -- . :^vendor
            echo "::error::Working directory is dirty. Please run 'just gen lint && go mod tidy && go mod vendor' and commit the changes."
            exit 1
          fi

      - name: Setup tmate session for debug
        if: ${{ failure() && github.event_name == 'workflow_dispatch' && inputs.debug_enabled }}
        uses: mxschmitt/action-tmate@v3
        timeout-minutes: 30
        with:
          limit-access-to-actor: true

  # faster build installer without airgap using hosted runners and ghcr.io
  build:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15

    strategy:
      matrix:
        os:
          - ubuntu-latest-x86-4-cores
          - ubuntu-24.04-arm64-4-core
          - macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: true

      - name: Setup Just
        uses: extractions/setup-just@v3

      - name: Setup docker on MacOS
        if: matrix.os == 'macos-latest'
        run: |
          brew install --formula docker

      - name: Setup oras
        uses: oras-project/setup-oras@v1

      - name: Setup local registry
        env:
          LOCALREG_SYNC_REGISTRY: ghcr.io
          LOCALREG_SYNC_USERNAME: ${{ github.actor }}
          LOCALREG_SYNC_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
        run: |
          just --timestamp _localreg &

      - name: Build hhfab for local OS/ARCH
        run: |
          just --timestamp oci_repo=127.0.0.1:30000 oci=http hhfab-build-local _hhfabctl-push-main

      - name: hhfab init
        env:
          HHFAB_REG_REPO: 127.0.0.1:30000
        run: |
          bin/hhfab init -v --dev --import-host-upstream

      - name: hhfab build --mode=manual
        run: |
          bin/hhfab build -v --mode=manual
          ls -lah result

      - name: hhfab build --mode=usb
        run: |
          bin/hhfab build -v --mode=usb
          ls -lah result

      - name: hhfab build --mode=iso
        run: |
          bin/hhfab build -v --mode=iso
          ls -lah result

      - name: Dump local registry logs
        if: ${{ always() }}
        run: |
          cat .zot/log

      - name: Setup tmate session for debug
        if: ${{ failure() && github.event_name == 'workflow_dispatch' && inputs.debug_enabled }}
        uses: mxschmitt/action-tmate@v3
        timeout-minutes: 30
        with:
          limit-access-to-actor: true

  build-multi:
    runs-on: lab
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: true

      - name: Setup Just
        uses: extractions/setup-just@v3

      - name: Build bins for all OS/ARCH
        run: |
          just --timestamp build-multi

      - name: Setup tmate session for debug
        if: ${{ failure() && github.event_name == 'workflow_dispatch' && inputs.debug_enabled }}
        uses: mxschmitt/action-tmate@v3
        timeout-minutes: 30
        with:
          limit-access-to-actor: true

  builds:
    runs-on: ubuntu-latest
    needs:
      - build
      - build-multi
    if: ${{ always() }}

    steps:
      - run: |
          result="${{ needs.build.result }}"
          if [[ $result == "success" || $result == "skipped" ]]; then
            exit 0
          else
            exit 1
          fi

  # Using reusable VLAB workflow
  vlab:
    if: ${{ !contains(github.event.pull_request.labels.*.name, 'skip-vlab') }}
    needs:
      - test
      - builds
    strategy:
      fail-fast: false
      matrix:
        include:
          - fabric_mode: spine-leaf
            include_onie: false
            gateway: false
            build_mode: usb
            vpc_mode: ""
          - fabric_mode: spine-leaf
            include_onie: false
            gateway: false
            build_mode: iso
            vpc_mode: ""
          - fabric_mode: spine-leaf
            include_onie: false
            gateway: false
            build_mode: manual
            vpc_mode: ""
          - fabric_mode: collapsed-core
            include_onie: false
            gateway: false
            build_mode: iso
            vpc_mode: ""
          - fabric_mode: spine-leaf
            include_onie: true
            gateway: false
            build_mode: usb
            vpc_mode: ""
          - fabric_mode: spine-leaf
            include_onie: true
            gateway: false
            build_mode: iso
            vpc_mode: ""
          - fabric_mode: spine-leaf
            include_onie: false
            gateway: false
            build_mode: iso
            vpc_mode: l3vni
          - fabric_mode: spine-leaf
            include_onie: false
            gateway: true
            build_mode: iso
            vpc_mode: ""
    
    uses: ./.github/workflows/run-vlab.yaml
    with:
      component_name: "fabricator"
      commit_sha: ${{ github.sha }}
      go_module_path: ""  # Empty indicates no module replacement (testing fabricator itself)
      fabric_mode: ${{ matrix.fabric_mode }}
      include_onie: ${{ matrix.include_onie }}
      gateway: ${{ matrix.gateway }}
      build_mode: ${{ matrix.build_mode }}
      vpc_mode: ${{ matrix.vpc_mode }}
      run_release_test: ${{ inputs.run_release_test == true || contains(github.event.pull_request.labels.*.name, 'release-test') }}
      debug_enabled: ${{ inputs.debug_enabled }}

  # Using reusable VLAB upgrade workflow
  vlab-upgrade:
    if: ${{ !contains(github.event.pull_request.labels.*.name, 'skip-vlab') }}
    needs:
      - test
      - builds
    strategy:
      fail-fast: false
      matrix:
        include:
          - fabric_mode: spine-leaf
            from_version: "beta-1"
            from_flags: "--usb"
          - fabric_mode: spine-leaf
            from_version: "24.09"
            from_flags: "-m=iso"
          - fabric_mode: spine-leaf
            from_version: "25.01"
            from_flags: "-m=iso"
          - fabric_mode: spine-leaf
            from_version: "25.02"
            from_flags: "-m=iso"
          - fabric_mode: spine-leaf
            from_version: "25.03"
            from_flags: "-m=iso"
          - fabric_mode: spine-leaf
            from_version: "dev"
            from_flags: "-m=iso"
    
    uses: ./.github/workflows/run-vlab-upgrade.yaml
    with:
      component_name: "fabricator"
      commit_sha: ${{ github.sha }}
      go_module_path: ""
      fabric_mode: ${{ matrix.fabric_mode }}
      from_version: ${{ matrix.from_version }}
      from_flags: ${{ matrix.from_flags }}
      debug_enabled: ${{ inputs.debug_enabled }}

  # Simplified check for matrix job results
  vlabs:
    runs-on: ubuntu-latest
    needs:
      - vlab
      - vlab-upgrade
    if: ${{ always() }}
    steps:
      - run: |
          # Check if any of the needed jobs failed
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" ]]; then
            echo "One or more vlab jobs failed"
            exit 1
          else
            echo "All vlab jobs succeeded or were skipped"
            exit 0
          fi

  # Using reusable HLAB workflow
  hlab:
    if: ${{ !contains(github.event.pull_request.labels.*.name, 'skip-hlab') }}
    needs:
      - test
      - builds
    
    uses: ./.github/workflows/run-hlab.yaml
    with:
      component_name: "fabricator"
      commit_sha: ${{ github.sha }}
      go_module_path: ""
      fabric_mode: "spine-leaf"
      include_onie: true
      build_mode: "iso"
      run_release_test: ${{ inputs.run_release_test == true || contains(github.event.pull_request.labels.*.name, 'release-test') }}
      debug_enabled: ${{ inputs.debug_enabled }}

  # Simplified check for job results
  hlabs:
    runs-on: ubuntu-latest
    needs:
      - hlab
    if: ${{ always() }}
    steps:
      - run: |
          if [[ "${{ needs.hlab.result }}" == "success" || "${{ needs.hlab.result }}" == "skipped" ]]; then
            echo "HLAB job succeeded or was skipped"
            exit 0
          else
            echo "HLAB job failed"
            exit 1
          fi

  publish-test-results:
    if: inputs.run_release_test == true || contains(github.event.pull_request.labels.*.name, 'release-test')
    runs-on: lab
    needs:
      - vlab
      - hlab

    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish Test Results
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: "artifacts/**/release-test.xml"

  publish-release:
    runs-on: lab
    if: startsWith(github.event.ref, 'refs/tags/v') && github.event_name == 'push'
    needs:
      - build
      - build-multi
      - vlab
      - vlab-upgrade

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: true

      - name: Login to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish Images, Helm charts and Bins on release
        run: |
          just --timestamp oci_repo=ghcr.io push push-multi

      - name: Create GH Release
        uses: softprops/action-gh-release@v2
        with:
          make_latest: true # TODO do it for master only
          files: |
            bin/hhfab-*.tar.gz
            bin/hhfabctl-*.tar.gz

      # Bump fabricator docs in the docs repository

      - name: Checkout docs repository
        uses: actions/checkout@v4
        with:
          repository: githedgehog/docs
          path: docs-repo
          persist-credentials: false

      - name: Copy docs from fabricator to docs
        run: |
          cp docs/api.md docs-repo/docs/reference/fab-api.md.gen

      - name: Generate token for the docs repository
        uses: actions/create-github-app-token@v2
        id: docs-app-token
        with:
          app-id: ${{ secrets.DOCS_APP_ID }}
          private-key: ${{ secrets.DOCS_PRIVATE_KEY }}
          repositories: |
            docs

      - name: Create Pull Request for docs
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ steps.docs-app-token.outputs.token }}
          path: docs-repo
          branch: pr/auto/fabricator-bump
          commit-message: |
            Update docs from fabricator@${{ github.ref_name }}

            This is an automated commit created by GitHub Actions workflow,
            in the fabricator repository.
          signoff: true
          title: "Update docs from fabricator@${{ github.ref_name }}"
          body: |
            This is an automated Pull Request created by GitHub Actions workflow,
            in the fabricator repository.

      - name: Setup tmate session for debug
        if: ${{ failure() && github.event_name == 'workflow_dispatch' && inputs.debug_enabled }}
        uses: mxschmitt/action-tmate@v3
        timeout-minutes: 30
        with:
          limit-access-to-actor: true

  publish-master:
    runs-on: lab
    if: github.event.ref == 'refs/heads/master' && github.event_name == 'push'
    needs:
      - build
      - build-multi
      - vlab
      - vlab-upgrade

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: true

      - name: Login to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish Images, Helm charts and Bins for master
        run: |
          just --timestamp oci_repo=ghcr.io version_extra=-master push push-multi

      - name: Setup tmate session for debug
        if: ${{ failure() && github.event_name == 'workflow_dispatch' && inputs.debug_enabled }}
        uses: mxschmitt/action-tmate@v3
        timeout-minutes: 30
        with:
          limit-access-to-actor: true
